name:
  ImmortalWrt Make Image

permissions:
  contents: write

on:
  repository_dispatch:
    types: [ "Source Code Update" ]
  workflow_dispatch:
    inputs:
      device:
        description: '编译设备型号'
        required: true
        type: choice
        default: '128M-Ubootmod'
        options:
          - '256M'
          - '128M'
          - '128M-Ubootmod'
          - 'all' 
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/ericyin/immortalwrt'
      commit:
        description: '指定源码commit进行编译，留空拉取最新源码'
        required: false
        type: string
        default: ''
      release:
        description: '是否发布编译产物到 Release'
        required: false
        type: boolean
        default: true
      prerelease:
        description: '是否发布为预发布版本 (Pre-release)'
        required: false
        type: boolean
        default: false

env:
  DEVICE_INPUT: ${{ github.event.inputs.device || github.event.client_payload.device }}
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release }}
  PRERELEASE: ${{ github.event.inputs.prerelease }}
  TZ: Asia/Shanghai

jobs:
  build:
    name: 🔨 Build Firmware
    runs-on: ubuntu-22.04
    
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4

      - name: 🪠 Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 🛠️ Init Environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: ⚙️ Setup ccache & DL cache
        uses: actions/cache@v4
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-${{ hashFiles('config/*.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-

      - name: 🔧 Configure ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z

      - name: 🧬 Update & Install feeds
        run: |
          cd openwrt
          [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && mv $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 🔨 Multi-Device Compilation Loop
        id: compile
        run: |
          # 1. 确定编译列表
          if [ "${DEVICE_INPUT}" = "all" ]; then
            DEVICES="256M 128M 128M-Ubootmod"
          else
            DEVICES="${DEVICE_INPUT}"
          fi

          mkdir -p $GITHUB_WORKSPACE/firmware_collection

          cd /workdir/openwrt

          for DEV in $DEVICES; do
            echo "::group::🚀 Building $DEV"
            
            # 2. 设置当前设备配置文件
            case "$DEV" in
              "256M") CONFIG="config/256m.config" ;;
              "128M") CONFIG="config/128m.config" ;;
              "128M-Ubootmod") CONFIG="config/128muboot.config" ;;
            esac
            
            echo "Using Config: $CONFIG"
            
            # 3. 加载配置
            cp -f $GITHUB_WORKSPACE/$CONFIG .config
            
            # 4. 刷新配置并下载
            make defconfig
            make download -j$(nproc)
            
            # 5. 开始编译
            # 使用 ccache 加速，并保留 Toolchain
            if ! make -j$(nproc) CC="ccache gcc" CXX="ccache g++"; then
              echo "⚠️ Multi-threaded failed, retrying single-threaded..."
              make -j1 V=s || exit 1
            fi

            echo "✅ $DEV build finished."
            df -hT /workdir
            echo "::endgroup::"
          done

          echo "📥 Collecting artifacts"
          find bin/targets/ -name "*sysupgrade.bin" -exec cp {} $GITHUB_WORKSPACE/firmware_collection/ \;

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 🪄 Upload Binaries (Artifacts)
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt_Combined_${{ env.DEVICE_INPUT }}_${{ env.REPO_BRANCH }}
          path: ${{ github.workspace }}/firmware_collection/*

      - name: 📌 Generate Release Tag
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="ImmortalWrt-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          cat > release.txt << EOF
          ## 📦 ImmortalWrt Firmware Release

          **🏷️ Release:** $RELEASE_TAG
          **🌿 Branch:** $REPO_BRANCH
          **📱 Device:** ${DEVICE_INPUT}
          **📅 Build Date:** $(date +"%Y-%m-%d %H:%M:%S")
          **🔨 Compiler:** GCC with ccache

          ## 📥 Download

          Download the firmware files from the assets below.

          ---

          Built with ❤️ using [GitHub Actions](https://github.com/features/actions)
          EOF

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 📤 Upload to Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: ${{ github.workspace }}/firmware_collection/*

      - name: 🚧 Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 9
